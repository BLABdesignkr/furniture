<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GOWER | Modern Furniture Studio</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    /* 1. 디자인 시스템 (Bower Studios White Tone) */
    :root {
      --gower-bg-white: #FFFFFF;
      --gower-text-black: #000000;
      --gower-text-gray: #777777;
      --gower-border: #E5E5E5;
      --font-serif: 'Playfair Display', serif;
      --font-sans: 'Noto Sans KR', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background-color: var(--gower-bg-white);
      color: var(--gower-text-black);
      font-family: var(--font-sans);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* 리빌 애니메이션 */
    .reveal { opacity: 0; transform: translateY(40px); transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1); }
    .reveal.active { opacity: 1; transform: translateY(0); }

    /* 2. 헤더 및 네비게이션 */
    .gower-header {
      position: sticky; top: 0; left: 0; width: 100%;
      background-color: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(5px);
      display: flex; justify-content: space-between; align-items: center;
      padding: 25px 40px; z-index: 999;
      border-bottom: 1px solid var(--gower-border);
    }
    
    .gower-logo {
      font-family: var(--font-serif);
      font-size: 1.5rem; font-weight: 500;
      letter-spacing: 0.3em; /* G O W E R 특유의 넓은 자간 */
      text-decoration: none; color: var(--gower-text-black);
    }

    .gower-nav { display: flex; gap: 40px; }
    .gower-nav a {
      text-decoration: none; color: var(--gower-text-black);
      font-size: 0.85rem; font-weight: 400; letter-spacing: 0.05em;
      transition: color 0.3s ease;
    }
    .gower-nav a:hover { color: var(--gower-text-gray); }

    /* 3. 히어로 섹션 (홈) */
    .gower-hero { padding: 40px; margin-top: 20px; }
    .gower-hero-img {
      width: 100%; height: 75vh;
      object-fit: cover;
      /* 바우어 스타일: 라운드 없이 날카로운 직각 엣지 */
      border-radius: 0; 
    }

    /* 4. 제품 섹션 (2장 배열) */
    .gower-products { padding: 80px 40px; text-align: center; }
    .gower-section-title {
      font-family: var(--font-sans);
      font-size: 1.1rem; font-weight: 400;
      letter-spacing: 0.05em; margin-bottom: 50px;
    }

    .gower-product-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 40px;
    }
    .gower-product-item img {
      width: 100%; height: 600px; object-fit: cover;
      border-radius: 0; transition: transform 0.6s ease;
    }
    .gower-product-item:hover img { transform: scale(1.02); } /* 호버 시 미세한 확대 */
    .gower-product-item { overflow: hidden; }

    /* 5. 가로 풀사이즈 이미지 배너 (300px 고정) */
    .gower-banner {
      width: 100vw; height: 300px;
      margin-left: calc(-50vw + 50%);
      position: relative; overflow: hidden;
    }
    .gower-banner img {
      width: 100%; height: 100%; object-fit: cover;
      filter: brightness(0.9);
    }

    /* 6. 뉴스레터 & 문의 섹션 (바우어 스타일) */
    .gower-newsletter {
      padding: 120px 20px; text-align: center;
    }
    .newsletter-top-text {
      font-family: var(--font-serif); font-size: 1rem;
      font-style: italic; color: var(--gower-text-gray);
      margin-bottom: 20px;
    }
    .newsletter-form {
      max-width: 450px; margin: 0 auto 15px auto;
      display: flex; align-items: center;
      border-bottom: 1px solid var(--gower-text-black);
      padding-bottom: 8px;
    }
    .newsletter-form input {
      flex-grow: 1; border: none; outline: none;
      font-family: var(--font-sans); font-size: 0.8rem;
      letter-spacing: 0.1em; color: var(--gower-text-black);
      text-transform: uppercase;
    }
    .newsletter-form input::placeholder { color: #CCCCCC; }
    .newsletter-form button {
      background: none; border: none; cursor: pointer;
      font-size: 1.2rem; color: var(--gower-text-black);
    }
    .newsletter-bottom-text {
      font-family: var(--font-sans); font-size: 0.8rem;
      letter-spacing: 0.05em;
    }

    /* 7. 푸터 */
    .gower-footer {
      padding: 80px 40px 40px 40px; text-align: center;
    }
    .footer-links {
      display: flex; justify-content: center; gap: 30px;
      margin-bottom: 30px;
    }
    .footer-links a {
      text-decoration: none; color: var(--gower-text-black);
      font-size: 0.8rem; font-family: var(--font-sans);
    }
    .footer-socials {
      margin-bottom: 40px; font-size: 1.2rem;
    }
    .footer-socials a { color: var(--gower-text-black); margin: 0 10px; text-decoration: none; }
    
    .footer-info {
      display: flex; justify-content: center; align-items: center; gap: 15px;
      font-size: 0.75rem; color: var(--gower-text-gray);
      flex-wrap: wrap;
    }
    .footer-dot { font-size: 0.5rem; }

    /* 모바일 반응형 */
    @media (max-width: 768px) {
      .gower-header { padding: 20px; }
      .gower-logo { font-size: 1.2rem; }
      .gower-hero { padding: 20px; margin-top: 0; }
      .gower-hero-img { height: 50vh; }
      .gower-products { padding: 60px 20px; }
      .gower-product-grid { grid-template-columns: 1fr; gap: 20px; }
      .gower-product-item img { height: 400px; }
      .footer-links { flex-wrap: wrap; gap: 15px; }
      .footer-info { flex-direction: column; gap: 8px; }
      .footer-dot { display: none; }
    }
  </style>
</head>
<body>

  <header class="gower-header">
    <a href="#" class="gower-logo">G O W E R</a>
    <nav class="gower-nav">
      <a href="#home">홈</a>
      <a href="#product">제품</a>
      <a href="#contact">문의</a>
    </nav>
  </header>

  <section class="gower-hero reveal" id="home">
    <img src="https://images.unsplash.com/photo-1600210492486-724fe5c67fb0?auto=format&fit=crop&w=1600&q=80" alt="Gower Studio Interior" class="gower-hero-img">
  </section>

  <section class="gower-products reveal" id="product">
    <h2 class="gower-section-title">Explore the Essentials</h2>
    <div class="gower-product-grid">
      <div class="gower-product-item">
        <img src="https://images.unsplash.com/photo-1538688525198-9b88f6f53126?auto=format&fit=crop&w=800&q=80" alt="Essential Chair">
      </div>
      <div class="gower-product-item">
        <img src="https://images.unsplash.com/photo-1505843490538-5133c6c7d0e1?auto=format&fit=crop&w=800&q=80" alt="Essential Lighting">
      </div>
    </div>
  </section>

  <section class="gower-products reveal" style="padding-top: 0;">
    <h2 class="gower-section-title">In The Wild</h2>
    <div class="gower-product-grid">
      <div class="gower-product-item">
        <img src="https://images.unsplash.com/photo-1616486338812-3dadae4b4ace?auto=format&fit=crop&w=800&q=80" alt="In The Wild 1">
      </div>
      <div class="gower-product-item">
        <img src="https://images.unsplash.com/photo-1592928302636-c83cf1e1c887?auto=format&fit=crop&w=800&q=80" alt="In The Wild 2">
      </div>
    </div>
  </section>

  <section class="gower-banner reveal">
    <img src="https://images.unsplash.com/photo-1618221195710-dd6b41faaea6?auto=format&fit=crop&w=1920&q=80" alt="Studio Banner">
  </section>

  <section class="gower-newsletter reveal" id="contact">
    <p class="newsletter-top-text">Be the first to know.</p>
    <div class="newsletter-form">
      <input type="email" placeholder="ENTER EMAIL">
      <button type="button"><i class="fa-solid fa-arrow-right-long"></i></button>
    </div>
    <p class="newsletter-bottom-text">Join Our Mailing List</p>
  </section>

  <footer class="gower-footer reveal">
    <div class="footer-links">
      <a href="#contact">Request A Quote</a>
      <a href="#">FAQ</a>
      <a href="#">Shipping/Returns</a>
      <a href="#">Careers</a>
      <a href="#contact">Contact</a>
    </div>
    <div class="footer-socials">
      <a href="#"><i class="fa-brands fa-instagram"></i></a>
      <a href="#"><i class="fa-brands fa-pinterest"></i></a>
    </div>
    <div class="footer-info">
      <span>info@bower-studios.com</span>
      <span class="footer-dot">•</span>
      <span>+1 347 694 8709</span>
      <span class="footer-dot">•</span>
      <span>Terms & Conditions</span>
      <span class="footer-dot">•</span>
      <span>© 2026 Bower Studios Inc.</span>
    </div>
  </footer>

  <script>
    const revealElements = document.querySelectorAll('.reveal');
    const revealOnScroll = () => {
      const windowHeight = window.innerHeight;
      revealElements.forEach(el => {
        if (el.getBoundingClientRect().top < windowHeight * 0.9) {
          el.classList.add('active');
        }
      });
    };
    window.addEventListener('scroll', revealOnScroll);
    window.addEventListener('load', revealOnScroll);
  </script>
</body>
</html>
